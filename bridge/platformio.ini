; PlatformIO project — Dataflash bridge (Art-Net / sACN / OSC -> Dataflash RS-485)
;
; Two targets share a common [env] base:
;   esp32-poe-iso : Olimex ESP32-PoE-ISO (classic ESP32, LAN8720 PHY, PoE) — full
;                   target role with wired Art-Net/sACN. Primary production board.
;   esp32-c3      : generic ESP32-C3 devkit (RISC-V, WiFi only, NO Ethernet) —
;                   bench board for scope-validating the TX. ETH code is compiled
;                   out on chips without an EMAC (see net.cpp #if SOC_EMAC_SUPPORTED).
;
; framework = Arduino-ESP32 2.0.x (IDF 4.4) is pinned because dataflash_tx.cpp uses
; the legacy RMT driver (driver/rmt.h / rmt_item32_t). This driver supports the C3
; under IDF 4.4. If you ever move to Arduino-ESP32 3.x (IDF 5.x), port the RMT code
; to the new rmt_tx.h encoder API. The critical 9-bit/375k TX is RMT, not UART,
; because classic ESP32 UART has no stick (mark/space) parity to hold the 9th bit.

[env]
platform = espressif32@^6.5.0      ; Arduino-ESP32 2.0.x / IDF 4.4
framework = arduino
monitor_speed = 115200
build_flags =
    -DCORE_DEBUG_LEVEL=3
    -DBOARD_HAS_PSRAM=0
lib_deps =
    hideakitai/ArtNet @ ^0.6.0          ; Art-Net receiver (works over ETH/WiFi UDP)
    esphome/ESPAsyncWebServer-esphome @ ^3.1.0   ; web UI (pulls in AsyncTCP)
    olikraus/U8g2 @ ^2.35.7             ; OLED + encoder (future front panel)
    ; sACN/E1.31 is implemented inline in src/inputs.cpp (no extra lib)
; Web assets can later move to LittleFS; for now the page is embedded in webui.cpp.
board_build.filesystem = littlefs

[env:esp32-poe-iso]
board = esp32-poe-iso
upload_speed = 460800

[env:esp32-c3]
board = esp32-c3-devkitm-1
; Most C3 devkits use a USB-UART bridge (CH340/CP2102) for serial. If yours is a
; native-USB board (XIAO, Lolin C3 mini) and the monitor is silent, add:
;   build_flags = ${env.build_flags} -DARDUINO_USB_MODE=1 -DARDUINO_USB_CDC_ON_BOOT=1

[env:esp32-s3-eth]
; WaveShare ESP32-S3-ETH (S3 + W5500 SPI Ethernet, native USB-C). Bench board for
; scope-validating the TX. NOTE: wired ETH here is W5500-over-SPI, which the no-arg
; RMII ETH.begin() in net.cpp does NOT drive — WiFi-AP fallback only until W5500
; SPI init is added. CDC-on-boot routes Serial to the native USB-Serial-JTAG port.
board = esp32-s3-devkitc-1
build_flags =
    ${env.build_flags}
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    ; Board-specific RS-485 pins. On this board GPIO4-7 are the onboard microSD
    ; slot and GPIO1-3/15/18/38-48 are the camera DVP — neither is on the header.
    ; GPIO16/17 are free, broken out on the Pico header, and not strapping pins.
    -DDF_TX_PIN=17     ; -> MAX485 DI  (data, Pico header H1 pin 7 is GPIO17)
    -DDF_DE_PIN=16     ; -> MAX485 DE+RE tied = DIR (HIGH=TX, LOW=RX)
    -DDF_RX_PIN=17     ; -> MAX485 RO via 1k/2k divider (shared pin; receiver tri-stated in TX)
    ; Unified bridge+sniffer firmware (default role=bridge). Hold BOOT at power-on
    ; for sniffer, or set g_cfg.role. One harness does both — no rewiring.

[env:esp32-s3-audio]
; Bridge + AUDIO INPUT (I2S mic on I2S1 + line-in on I2S0, software-selectable).
; Same S3-ETH board as esp32-s3-eth, plus the audio DSP module (src/audio.cpp).
; ⚠️ VERIFY the I2S pins below against the WaveShare ESP32-S3-ETH header AND the
;    W5500 SPI pins before wiring — these are placeholders, not confirmed-free.
; Mic = INMP441/SPH0645 (no MCLK). Line-in = PCM/I2S ADC (PCM1808-class may need
;    MCLK — see audio.cpp note before using line-in).
board = esp32-s3-devkitc-1
build_flags =
    ${env.build_flags}
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DDF_TX_PIN=17
    -DDF_DE_PIN=16
    -DDF_RX_PIN=17       ; shared DI/RO pin (unified bridge+sniffer)
    -DDF_AUDIO
    -DDF_AUD_MIC_BCK=8   ; INMP441 SCK
    -DDF_AUD_MIC_WS=9    ; INMP441 WS/LRCL
    -DDF_AUD_MIC_SD=10   ; INMP441 SD/DOUT
    -DDF_AUD_LINE_BCK=11
    -DDF_AUD_LINE_WS=12
    -DDF_AUD_LINE_SD=13

[env:esp32-s3-sniff]
; Same UNIFIED firmware as esp32-s3-eth, but defaults to the SNIFFER role
; (DF_ROLE_DEFAULT=1) for convenience. Identical wiring to the bridge build:
;   GPIO17 = MAX485 DI + RO-via-1k/2k-divider (shared); GPIO16 = DE+RE = DIR.
; Listen-only: the firmware drives DIR(GPIO16) LOW. Prints <hex>C/<hex>d.
; (You can also just flash esp32-s3-eth and hold BOOT at power-on to sniff.)
board = esp32-s3-devkitc-1
build_flags =
    ${env.build_flags}
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DDF_TX_PIN=17
    -DDF_DE_PIN=16
    -DDF_RX_PIN=17
    -DDF_ROLE_DEFAULT=1
